<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Glitch — Access</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;700&display=swap" rel="stylesheet">

    <style>
        :root {
            --blue: #3987b8;
            --black: #3e4447;
            --light-gray: #f4f5f5;
            --white: #ffffff;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            font-weight: 300;
            background: linear-gradient(135deg, var(--light-gray) 0%, var(--white) 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--black);
        }

        .login-container {
            background: var(--white);
            padding: 60px 40px;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(62, 68, 71, 0.12);
            max-width: 420px;
            width: 100%;
            animation: fadeIn 0.5s ease;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .logo {
            font-size: 24px;
            font-weight: 400;
            margin-bottom: 40px;
            text-align: center;
        }

        h1 {
            font-size: 2rem;
            font-weight: 300;
            margin-bottom: 16px;
            text-align: center;
        }

        h1 .highlight {
            color: var(--blue);
            font-weight: 600;
        }

        .subtitle {
            text-align: center;
            opacity: 0.75;
            margin-bottom: 40px;
            font-size: 0.95rem;
        }

        .form-group {
            margin-bottom: 24px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-size: 0.9rem;
            opacity: 0.8;
        }

        input[type="password"] {
            width: 100%;
            padding: 12px 16px;
            border: 2px solid var(--light-gray);
            border-radius: 8px;
            font-family: 'Plus Jakarta Sans', sans-serif;
            font-size: 1rem;
            font-weight: 300;
            transition: border-color 0.3s ease;
            outline: none;
        }

        input[type="password"]:focus {
            border-color: var(--blue);
        }

        .btn-submit {
            width: 100%;
            padding: 14px 24px;
            background: var(--blue);
            color: var(--white);
            border: none;
            border-radius: 8px;
            font-family: 'Plus Jakarta Sans', sans-serif;
            font-size: 1rem;
            font-weight: 400;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .btn-submit:hover {
            background: #2c6b94;
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(57, 135, 184, 0.3);
        }

        .btn-submit:active {
            transform: translateY(0);
        }

        .error-message {
            color: #d32f2f;
            font-size: 0.85rem;
            margin-top: 8px;
            display: none;
            text-align: center;
        }

        .error-message.show {
            display: block;
            animation: shake 0.3s ease;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-5px); }
            75% { transform: translateX(5px); }
        }

        .footer-text {
            text-align: center;
            font-size: 0.8rem;
            opacity: 0.5;
            margin-top: 40px;
        }

        @media (max-width: 480px) {
            .login-container {
                padding: 40px 24px;
            }

            h1 {
                font-size: 1.5rem;
            }
        }
    </style>
</head>
<body>

    <div class="login-container">
        <div class="logo">glitch</div>
        <h1>Zugang<br><span class="highlight">freigeschaltet?</span></h1>
        <p class="subtitle">Passwort eingeben, um weiterzumachen.</p>

        <form id="loginForm" onsubmit="handleLogin(event)">
            <div class="form-group">
                <label for="password">Passwort</label>
                <input
                    type="password"
                    id="password"
                    placeholder="••••••••••"
                    autocomplete="off"
                    autofocus
                >
                <div class="error-message" id="errorMessage">Passwort falsch. Versuchen Sie es erneut.</div>
            </div>

            <button type="submit" class="btn-submit">Zugriff</button>
        </form>

        <div class="footer-text">
            Unwritten Studio — glitch.unwritten.studio
        </div>
    </div>

    <script>
        const CORRECT_PASSWORD = 'anjelic123';
        const AUTH_KEY = 'glitch_auth_session';

        // Beim Laden der Seite prüfen, ob schon authentifiziert
        window.addEventListener('load', () => {
            if (sessionStorage.getItem(AUTH_KEY)) {
                redirectToApp();
            }
        });

        function handleLogin(event) {
            event.preventDefault();

            const passwordInput = document.getElementById('password');
            const errorMessage = document.getElementById('errorMessage');
            const password = passwordInput.value.trim();

            if (password === CORRECT_PASSWORD) {
                // Authentifizierung erfolgreich
                sessionStorage.setItem(AUTH_KEY, 'true');
                errorMessage.classList.remove('show');
                redirectToApp();
            } else {
                // Falsch
                console.log('Eingabe:', password);
                console.log('Erwartet:', CORRECT_PASSWORD);
                errorMessage.classList.add('show');
                passwordInput.value = '';
                passwordInput.focus();
            }
        }

        function redirectToApp() {
            window.location.href = 'index.html';
        }

        // Enter-Taste zum Absenden
        document.getElementById('password').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                document.getElementById('loginForm').dispatchEvent(new Event('submit'));
            }
        });
    </script>

</body>
</html>
